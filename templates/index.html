<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>PC Remote</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --radius: 8px;
  --toolbar-h: 44px;
  --bottombar-h: 48px;
  --panel-h: 0px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

/* ---- Toolbar ---- */
#toolbar {
  position:fixed; top:0; left:0; right:0; height:var(--toolbar-h);
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 8px; gap:6px; z-index:100;
  user-select:none; overflow-x:auto; overflow-y:hidden;
}
.status-dot { width:9px; height:9px; border-radius:50%; background:var(--red); flex-shrink:0; transition:background .3s; }
.status-dot.connected { background:var(--green); }
.tl { font-size:12px; color:var(--text-dim); white-space:nowrap; }
.spacer { flex:1; min-width:4px; }
.tb {
  background:transparent; border:1px solid var(--border); color:var(--text-dim);
  padding:4px 8px; border-radius:6px; font-size:12px; cursor:pointer;
  transition:all .12s; white-space:nowrap; flex-shrink:0;
}
.tb:hover { background:var(--border); color:var(--text); }
.tb.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tb.audio-active { background:var(--green); color:#000; border-color:var(--green); }
.zoom-g { display:flex; align-items:center; gap:3px; flex-shrink:0; }
.zoom-g .tb { padding:4px 6px; font-weight:700; }
#zoom-label { font-size:11px; color:var(--text); min-width:32px; text-align:center; }
#latency-display { font-size:10px; color:var(--green); white-space:nowrap; flex-shrink:0; font-variant-numeric:tabular-nums; }
#frame-info { font-size:10px; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }

/* ---- Canvas ---- */
#canvas-wrap {
  position:fixed; top:var(--toolbar-h); left:0; right:0;
  bottom:calc(var(--panel-h) + var(--bottombar-h)); background:#000; overflow:auto; touch-action:none;
  transition:bottom .2s;
}
#canvas-center {
  display:flex; align-items:flex-start; justify-content:center;
  min-width:100%; min-height:100%;
  padding-top:12px; padding-bottom:60vh;
}
#screen-container { position:relative; display:inline-block; flex-shrink:0; }
#screen-video {
  display:block; background:#000;
  width:100%; height:100%;
}
#screen-video.hidden { display:none; }
#screen {
  display:block; cursor:none; flex-shrink:0;
}
#screen.overlay {
  position:absolute; top:0; left:0;
  width:100% !important; height:100% !important;
  background:transparent;
}
.view-only #screen, .view-only #trackpad-area { pointer-events:none; cursor:default; }
.view-only #screen.overlay { pointer-events:none; cursor:default; }
#viewonly-badge {
  display:none; position:fixed; bottom:calc(var(--panel-h) + var(--bottombar-h) + 8px); right:8px;
  background:var(--orange); color:#000; padding:4px 12px; border-radius:12px;
  font-size:11px; font-weight:700; z-index:95; pointer-events:none;
}
.view-only #viewonly-badge { display:block; }

/* ---- Pan Overlay (zoomed-in navigation) ---- */
#pan-overlay {
  position:fixed; z-index:92; pointer-events:none;
  right:16px; bottom:calc(var(--panel-h) + var(--bottombar-h) + 16px);
  width:110px; height:110px;
}
.pan-btn {
  position:absolute; pointer-events:auto;
  width:36px; height:36px; border-radius:50%;
  background:rgba(22,27,34,0.85); border:1px solid var(--border);
  color:var(--text); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .1s; user-select:none; -webkit-user-select:none;
  box-shadow:0 2px 6px rgba(0,0,0,.4); backdrop-filter:blur(4px);
}
.pan-btn:hover { background:rgba(88,166,255,0.25); }
.pan-btn:active { background:var(--accent); color:#fff; }
#pan-up    { top:0;  left:50%; transform:translateX(-50%); }
#pan-down  { bottom:0; left:50%; transform:translateX(-50%); }
#pan-left  { left:0; top:50%; transform:translateY(-50%); }
#pan-right { right:0; top:50%; transform:translateY(-50%); }

/* ---- Bottom Action Bar ---- */
#bottombar {
  position:fixed; left:6px; right:6px; bottom:6px; min-height:calc(var(--bottombar-h) - 12px);
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  display:flex; flex-wrap:nowrap; align-items:center; padding:4px 8px; gap:3px; z-index:100;
  user-select:none; overflow-x:auto; overflow-y:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
#bottombar::-webkit-scrollbar { height:4px; }
#bottombar::-webkit-scrollbar-track { background:transparent; }
#bottombar::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.bb { 
  background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
  padding:5px 0; border-radius:6px; font-size:12px; cursor:pointer;
  text-align:center; min-width:34px; flex-shrink:0;
  transition:all .1s; user-select:none; -webkit-user-select:none; line-height:1;
}
.bb:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.bb.sep { background:transparent; border:none; color:var(--border); cursor:default; padding:0 1px; min-width:auto; font-size:14px; }
.bb.wide { min-width:44px; padding:5px 6px; }
.bb.arrow { font-size:16px; min-width:32px; }
#bb-text-input {
  width:140px; min-width:100px; flex-shrink:0; height:26px;
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-size:12px; padding:0 6px; outline:none;
}
#bb-text-input:focus { border-color:var(--accent); }
#bb-text-input::placeholder { color:var(--text-dim); font-size:11px; }

/* ---- Bottom Panel Container ---- */
#bottom-panel {
  position:fixed; left:0; right:0; bottom:var(--bottombar-h); height:0;
  background:var(--surface); border-top:1px solid var(--border);
  z-index:90; overflow:hidden; transition:height .2s;
}
#bottom-panel.open { height:var(--panel-h); }
.panel-page { display:none; height:100%; overflow-y:auto; }
.panel-page.visible { display:block; }

/* ---- Virtual Keyboard Panel ---- */
.vk-section { padding:6px 8px; border-bottom:1px solid var(--border); }
.vk-section:last-child { border-bottom:none; }
.vk-row { display:flex; gap:4px; flex-wrap:wrap; }
.vk-label { font-size:10px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.vk-key {
  background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
  padding:6px 0; border-radius:6px; font-size:12px; cursor:pointer;
  text-align:center; min-width:36px; flex:1; max-width:60px;
  transition:all .1s; user-select:none; -webkit-user-select:none;
}
.vk-key:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.vk-key.wide { max-width:80px; }
.vk-key.wider { max-width:120px; flex:2; }
.vk-key.mod { border-color:var(--orange); color:var(--orange); }
.vk-key.mod.held { background:var(--orange); color:#000; border-color:var(--orange); }
.vk-key.shortcut { font-size:10px; border-color:var(--accent); color:var(--accent); max-width:72px; }
.vk-key.shortcut:active { background:var(--accent); color:#fff; }
.vk-text-row { display:flex; gap:4px; }
#vk-text-input {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:6px 10px; font-size:14px; outline:none;
}
#vk-text-input:focus { border-color:var(--accent); }
#vk-text-send {
  background:var(--accent); color:#fff; border:none; border-radius:6px;
  padding:6px 14px; font-size:12px; cursor:pointer;
}

/* ---- Virtual Trackpad Panel ---- */
#trackpad-area {
  background:var(--bg); margin:8px; border-radius:10px; border:1px solid var(--border);
  height:calc(100% - 60px); min-height:100px; touch-action:none; cursor:crosshair;
  display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:13px;
  user-select:none; -webkit-user-select:none;
}
.tp-buttons { display:flex; gap:4px; padding:4px 8px; }
.tp-btn {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--text-dim); padding:8px; border-radius:6px; text-align:center;
  font-size:12px; cursor:pointer; user-select:none; -webkit-user-select:none;
}
.tp-btn:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tp-btn.active { background:var(--orange); color:#000; border-color:var(--orange); }

/* ---- File Panel ---- */
.file-section { padding:8px; }
.file-upload-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
.file-upload-row input[type=file] { flex:1; font-size:12px; color:var(--text-dim); }
.file-upload-btn {
  background:var(--accent); color:#fff; border:none; border-radius:6px;
  padding:6px 14px; font-size:12px; cursor:pointer; white-space:nowrap;
}
.file-path-bar {
  display:flex; align-items:center; gap:4px; margin-bottom:6px;
  font-size:12px; color:var(--text-dim); overflow-x:auto; white-space:nowrap;
}
.file-path-bar button {
  background:var(--surface2); border:1px solid var(--border); color:var(--accent);
  padding:3px 8px; border-radius:4px; font-size:11px; cursor:pointer;
}
.file-list { max-height:calc(100% - 80px); overflow-y:auto; }
.file-item {
  display:flex; align-items:center; gap:8px; padding:6px 8px;
  border-bottom:1px solid var(--border); font-size:12px; cursor:pointer;
}
.file-item:hover { background:var(--surface2); }
.file-icon { font-size:16px; flex-shrink:0; }
.file-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-size { color:var(--text-dim); font-size:11px; flex-shrink:0; }
.file-dl {
  background:var(--surface2); border:1px solid var(--border); color:var(--accent);
  padding:2px 8px; border-radius:4px; font-size:11px; cursor:pointer; text-decoration:none; flex-shrink:0;
}

/* ---- Clipboard Panel ---- */
.clip-section { padding:8px; height:100%; display:flex; flex-direction:column; }
.clip-section textarea {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:8px; font-size:13px; resize:none; outline:none; font-family:monospace;
}
.clip-section textarea:focus { border-color:var(--accent); }
.clip-actions { display:flex; gap:6px; margin-top:6px; }
.clip-actions button {
  flex:1; padding:8px; border-radius:6px; border:1px solid var(--border);
  font-size:12px; cursor:pointer; background:var(--surface2); color:var(--text-dim);
}
.clip-actions .primary { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ---- Settings ---- */
#settings-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:200; align-items:center; justify-content:center;
}
#settings-overlay.open { display:flex; }
#settings-panel {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:20px; width:340px; max-width:90vw; max-height:90vh; overflow-y:auto;
}
#settings-panel h2 { font-size:15px; margin-bottom:16px; }
.sr { margin-bottom:12px; }
.sr label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
.sr label span { color:var(--text); font-weight:600; }
.sr input[type=range] { width:100%; accent-color:var(--accent); }
.sr select {
  width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
  border-radius:6px; padding:5px 8px; font-size:12px; outline:none;
}
.sa { display:flex; gap:6px; margin-top:16px; }
.sa button { flex:1; padding:7px; border-radius:6px; border:1px solid var(--border); font-size:12px; cursor:pointer; }
.sa .apply { background:var(--accent); color:#fff; border-color:var(--accent); }
.sa .cancel { background:transparent; color:var(--text-dim); }

/* ---- Connection banner ---- */
#connect-banner {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:var(--bg);
  z-index:300; gap:16px; transition:opacity .3s;
}
#connect-banner.hidden { opacity:0; pointer-events:none; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#connect-banner p { font-size:14px; color:var(--text-dim); }

/* ---- Toast ---- */
#toast {
  position:fixed; top:calc(var(--toolbar-h)+8px); left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); color:var(--text); padding:6px 16px;
  border-radius:20px; font-size:12px; z-index:150; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
#toast.show { opacity:1; }

/* ---- Utility ---- */
#kb-input { position:fixed; top:-100px; left:-100px; width:1px; height:1px; opacity:0; }
</style>
</head>
<body>

<div id="connect-banner"><div class="spinner"></div><p>Connecting to PC...</p></div>
<div id="toast"></div>

<!-- ===== Toolbar ===== -->
<div id="toolbar">
  <div class="status-dot" id="status-dot"></div>
  <span class="tl" id="status-text">Disconnected</span>
  <span id="latency-display"></span>
  <span class="tl" id="fps-display"></span>
  <span id="frame-info"></span>
  <span class="spacer"></span>
  <div class="zoom-g">
    <button class="tb" id="btn-zo" title="Zoom out">&minus;</button>
    <span id="zoom-label">Fit</span>
    <button class="tb" id="btn-zi" title="Zoom in">+</button>
    <button class="tb" id="btn-zf" title="Fit">Fit</button>
  </div>
  <select class="tb" id="monitor-sel" title="Select monitor" style="padding:3px 4px;font-size:11px;background:var(--surface);color:var(--text-dim);max-width:120px;"></select>
  <button class="tb" id="btn-mode" title="Direct / Trackpad">Direct</button>
  <button class="tb" id="btn-p-tp" title="Trackpad panel">Pad</button>
  <button class="tb" id="btn-p-kb" title="Virtual keyboard">Keys</button>
  <button class="tb" id="btn-p-clip" title="Clipboard">Clip</button>
  <button class="tb" id="btn-p-files" title="File transfer">Files</button>
  <button class="tb" id="btn-nkb" title="Native keyboard">NKB</button>
  <button class="tb" id="btn-audio" title="Audio">&#128266;</button>
  <button class="tb" id="btn-screenshot" title="Screenshot">&#128247;</button>
  <button class="tb" id="btn-viewonly" title="View-only mode">&#128065;</button>
  <button class="tb" id="btn-fullscreen" title="Fullscreen">&#9974;</button>
  <button class="tb" id="btn-settings" title="Settings">&#9881;</button>
</div>

<!-- ===== Canvas ===== -->
<div id="canvas-wrap">
  <div id="canvas-center">
    <div id="screen-container">
      <video id="screen-video" autoplay playsinline muted class="hidden"></video>
      <canvas id="screen" tabindex="0"></canvas>
    </div>
  </div>
</div>
<div id="viewonly-badge">VIEW ONLY</div>

<!-- ===== Pan Overlay (visible when zoomed) ===== -->
<div id="pan-overlay" style="display:none">
  <button class="pan-btn" id="pan-up" title="Pan up">&#9650;</button>
  <button class="pan-btn" id="pan-left" title="Pan left">&#9664;</button>
  <button class="pan-btn" id="pan-right" title="Pan right">&#9654;</button>
  <button class="pan-btn" id="pan-down" title="Pan down">&#9660;</button>
</div>

<!-- ===== Bottom Action Bar ===== -->
<div id="bottombar">
  <button class="bb wide" id="bb-lclick" title="Left Click">L Click</button>
  <button class="bb wide" id="bb-rclick" title="Right Click">R Click</button>
  <button class="bb wide" id="bb-dblclick" title="Double Click">Dbl</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-sup" title="Scroll Up">&#8593;Scr</button>
  <button class="bb" id="bb-sdn" title="Scroll Down">&#8595;Scr</button>
  <span class="bb sep">|</span>
  <button class="bb arrow" id="bb-left" title="Arrow Left">&larr;</button>
  <button class="bb arrow" id="bb-down" title="Arrow Down">&darr;</button>
  <button class="bb arrow" id="bb-up" title="Arrow Up">&uarr;</button>
  <button class="bb arrow" id="bb-right" title="Arrow Right">&rarr;</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-esc" title="Escape">Esc</button>
  <button class="bb" id="bb-tab" title="Tab">Tab</button>
  <button class="bb" id="bb-enter" title="Enter">&#9166;</button>
  <button class="bb" id="bb-bksp" title="Backspace">&#9003;</button>
  <button class="bb" id="bb-space" title="Space">Space</button>
  <button class="bb" id="bb-del" title="Delete">Del</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-home" title="Home">Home</button>
  <button class="bb" id="bb-end" title="End">End</button>
  <button class="bb" id="bb-pgup" title="Page Up">PgUp</button>
  <button class="bb" id="bb-pgdn" title="Page Down">PgDn</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-mclick" title="Middle Click">Mid</button>
  <span class="bb sep">|</span>
  <input type="text" id="bb-text-input" placeholder="Type text & push…" autocomplete="off" spellcheck="false">
  <button class="bb wide" id="bb-text-push" title="Push text to remote cursor">Push</button>

</div>

<!-- ===== Bottom Panel ===== -->
<div id="bottom-panel">

  <!-- Virtual Keyboard -->
  <div id="panel-kb" class="panel-page">
    <div class="vk-section">
      <div class="vk-label">Modifiers (sticky — tap to hold, tap again to release)</div>
      <div class="vk-row" id="mod-row">
        <button class="vk-key mod" data-mod="ctrl">Ctrl</button>
        <button class="vk-key mod" data-mod="alt">Alt/&#8997;</button>
        <button class="vk-key mod" data-mod="cmd">Cmd/&#8984;</button>
        <button class="vk-key mod" data-mod="shift">Shift/&#8679;</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Developer Shortcuts</div>
      <div class="vk-row">
        <button class="vk-key shortcut" data-hk="cmd+s">&#8984;S</button>
        <button class="vk-key shortcut" data-hk="cmd+c">&#8984;C</button>
        <button class="vk-key shortcut" data-hk="cmd+v">&#8984;V</button>
        <button class="vk-key shortcut" data-hk="cmd+x">&#8984;X</button>
        <button class="vk-key shortcut" data-hk="cmd+z">&#8984;Z</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+z">&#8984;&#8679;Z</button>
        <button class="vk-key shortcut" data-hk="cmd+a">&#8984;A</button>
        <button class="vk-key shortcut" data-hk="cmd+f">&#8984;F</button>
      </div>
      <div class="vk-row" style="margin-top:4px">
        <button class="vk-key shortcut" data-hk="cmd+shift+p">&#8984;&#8679;P</button>
        <button class="vk-key shortcut" data-hk="cmd+p">&#8984;P</button>
        <button class="vk-key shortcut" data-hk="cmd+w">&#8984;W</button>
        <button class="vk-key shortcut" data-hk="cmd+t">&#8984;T</button>
        <button class="vk-key shortcut" data-hk="cmd+n">&#8984;N</button>
        <button class="vk-key shortcut" data-hk="cmd+`">&#8984;`</button>
        <button class="vk-key shortcut" data-hk="cmd+Tab">&#8984;Tab</button>
        <button class="vk-key shortcut" data-hk="ctrl+`">&#8963;`</button>
      </div>
      <div class="vk-row" style="margin-top:4px">
        <button class="vk-key shortcut" data-hk="cmd+shift+f">&#8984;&#8679;F</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+e">&#8984;&#8679;E</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+k">&#8984;&#8679;K</button>
        <button class="vk-key shortcut" data-hk="alt+Enter">&#8997;&#9166;</button>
        <button class="vk-key shortcut" data-hk="cmd+d">&#8984;D</button>
        <button class="vk-key shortcut" data-hk="cmd+/">&#8984;/</button>
        <button class="vk-key shortcut" data-hk="alt+shift+f">&#8997;&#8679;F</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+l">&#8984;&#8679;L</button>
        <button class="vk-key shortcut" data-hk="ctrl+c">&#8963;C</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label sc-label">Screenshot &amp; System</div>
      <div class="vk-row">
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+3">&#8984;&#8679;3</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+4">&#8984;&#8679;4</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+5">&#8984;&#8679;5</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+6">&#8984;&#8679;6</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<script>
(function() {
"use strict";

const $ = (s) => document.getElementById(s);
const canvas = $("screen"), ctx = canvas.getContext("2d");
const canvasWrap = $("canvas-wrap"), canvasCenter = $("canvas-center");
const screenContainer = $("screen-container");
const screenVideo = $("screen-video");
const bottomPanel = $("bottom-panel");
const toast = $("toast");

let viewOnly = false;
let useWebRTC = false;
let rtcPC = null;

// ===== localStorage helpers =====
const STORAGE_KEY = "pc_remote_settings";
function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveSettings(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

// ===== State =====
let screenW = 1, screenH = 1;
let cursorX = 0.5, cursorY = 0.5;
let isConnected = false;
let frameCount = 0, lastFrameBytes = 0;
let interactionMode = "direct";
let cursorSens = 2.0;

// Zoom
const ZOOM_MIN = 0.25, ZOOM_MAX = 5.0, ZOOM_STEP = 0.25;
let zoomLevel = 1, baseFitW = 100, baseFitH = 100;

// Sticky modifiers
const mods = { ctrl: false, alt: false, cmd: false, shift: false };
const isMacBrowser = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
let isRemoteMac = true; // default; will be updated from screen_info

function adaptShortcutLabels(remoteOS) {
  isRemoteMac = (remoteOS === "macos");
  if (!isRemoteMac) {
    document.querySelectorAll(".vk-key.shortcut, .sc-label").forEach(el => {
      el.innerHTML = el.innerHTML.replace(/\u2318/g, "Ctrl").replace(/\u2963/g, "Ctrl").replace(/\u2325/g, "Alt");
    });
    const cmdModBtn = document.querySelector('.vk-key.mod[data-mod="cmd"]');
    if (cmdModBtn) cmdModBtn.innerHTML = "Ctrl/Win";
  }
}

// Active panel
let activePanel = null;
const PANEL_HEIGHT = 300;

// Audio
let audioActive = false;
let audioCtx = null, audioProcessor = null, audioQueue = [];

// Latency
let latencyMs = 0;

// ===== Socket =====
const tunnelMatch = window.location.pathname.match(/^(\/tunnel\/[^\/]+)/);
const BASE = tunnelMatch ? tunnelMatch[1] : "";
const socket = io({ path: BASE + "/socket.io/", transports: ["websocket"] });

socket.on("connect", () => {
  isConnected = true;
  $("status-dot").classList.add("connected");
  $("status-text").textContent = "Connected";
  setTimeout(() => $("connect-banner").classList.add("hidden"), 400);

  // Send saved settings to server on connect
  const saved = loadSavedSettings();
  if (saved) {
    socket.emit("update_settings", {
      fps: saved.fps || 15,
      quality: saved.quality || 70,
      scale: (saved.scale || 75) / 100,
      format: saved.format || "webp",
    });
    // Restore UI
    $("sl-fps").value = saved.fps || 15;
    $("sl-q").value = saved.quality || 70;
    $("sl-s").value = saved.scale || 75;
    $("sel-fmt").value = saved.format || "webp";
    if (saved.sens) { cursorSens = saved.sens; $("sl-sens").value = saved.sens * 10; $("val-sens").textContent = saved.sens.toFixed(1); }
    $("val-fps").textContent = saved.fps || 15;
    $("val-q").textContent = saved.quality || 70;
    $("val-s").textContent = ((saved.scale || 75) / 100).toFixed(2);
  }
});
socket.on("disconnect", () => {
  isConnected = false;
  $("status-dot").classList.remove("connected");
  $("status-text").textContent = "Disconnected";
  $("connect-banner").classList.remove("hidden");
});
socket.on("screen_info", (d) => {
  screenW = d.width; screenH = d.height;

  if (d.os) adaptShortcutLabels(d.os);

  // Populate monitor selector
  if (d.monitors && d.monitors.length > 0) {
    const sel = $("monitor-sel");
    sel.innerHTML = "";
    d.monitors.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.index;
      opt.textContent = m.label + " (" + m.width + "x" + m.height + ")";
      sel.appendChild(opt);
    });
    if (d.active_monitor !== undefined) sel.value = d.active_monitor;
    sel.style.display = d.monitors.length > 2 ? "" : "none";
  }

  if (d.webrtc && !rtcPC) startWebRTC();
});

socket.on("monitor_changed", (d) => {
  showToast("Switched to " + d.label + " (" + d.width + "x" + d.height + ")");
});

$("monitor-sel").onchange = () => {
  const idx = parseInt($("monitor-sel").value);
  socket.emit("select_monitor", { index: idx });
  // If using WebRTC, renegotiate to get the new resolution
  if (useWebRTC && rtcPC) {
    rtcPC.close();
    rtcPC = null;
    useWebRTC = false;
    setTimeout(() => startWebRTC(), 500);
  }
};

// ===== Frames with requestAnimationFrame =====
const frameImg = new Image();
let framePending = false, firstFrame = true, newFrameReady = false;

frameImg.onload = () => {
  if (canvas.width !== frameImg.width || canvas.height !== frameImg.height) {
    canvas.width = frameImg.width;
    canvas.height = frameImg.height;
    if (firstFrame) { firstFrame = false; recalcFit(); applyZoom(); }
  }
  newFrameReady = true;
  framePending = false;
  frameCount++;
};

function renderLoop() {
  if (newFrameReady) {
    ctx.drawImage(frameImg, 0, 0);
    newFrameReady = false;
  }
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

socket.on("frame", (d) => {
  if (framePending) return;
  framePending = true;
  screenW = d.w; screenH = d.h;
  const mime = d.fmt || "image/jpeg";
  lastFrameBytes = d.img.length * 0.75; // approximate decoded size
  frameImg.src = "data:" + mime + ";base64," + d.img;
});

setInterval(() => {
  $("fps-display").textContent = frameCount + " FPS";
  if (useWebRTC) {
    $("frame-info").textContent = "WebRTC";
  } else {
    const kb = Math.round(lastFrameBytes / 1024);
    $("frame-info").textContent = kb > 0 ? "~" + kb + "KB/f" : "";
  }
  frameCount = 0;
}, 1000);

// ===== WebRTC =====
function startWebRTC() {
  if (rtcPC) { rtcPC.close(); rtcPC = null; }
  rtcPC = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
  });

  rtcPC.addTransceiver("video", { direction: "recvonly" });

  rtcPC.ontrack = (ev) => {
    screenVideo.srcObject = ev.streams[0];
    screenVideo.classList.remove("hidden");
    canvas.classList.add("overlay");
    useWebRTC = true;
    LOGGER.log("WebRTC track received");

    screenVideo.onloadedmetadata = () => {
      canvas.width = screenVideo.videoWidth;
      canvas.height = screenVideo.videoHeight;
      recalcFit(); applyZoom();
    };

    if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
      function countFrame() { frameCount++; screenVideo.requestVideoFrameCallback(countFrame); }
      screenVideo.requestVideoFrameCallback(countFrame);
    }
  };

  rtcPC.onicecandidate = (ev) => {
    if (ev.candidate) {
      socket.emit("webrtc_ice", {
        candidate: ev.candidate.candidate,
        sdpMid: ev.candidate.sdpMid,
        sdpMLineIndex: ev.candidate.sdpMLineIndex,
      });
    }
  };

  rtcPC.onconnectionstatechange = () => {
    LOGGER.log("WebRTC state:", rtcPC.connectionState);
    if (rtcPC.connectionState === "failed" || rtcPC.connectionState === "disconnected") {
      useWebRTC = false;
      screenVideo.classList.add("hidden");
      canvas.classList.remove("overlay");
      showToast("WebRTC disconnected — falling back to Socket.IO");
    }
  };

  rtcPC.createOffer().then(offer => {
    return rtcPC.setLocalDescription(offer);
  }).then(() => {
    socket.emit("webrtc_offer", {
      sdp: rtcPC.localDescription.sdp,
      type: rtcPC.localDescription.type,
    });
  }).catch(err => {
    LOGGER.error("WebRTC offer failed:", err);
    showToast("WebRTC setup failed — using Socket.IO fallback");
  });
}

socket.on("webrtc_answer", (d) => {
  if (!rtcPC) return;
  rtcPC.setRemoteDescription(new RTCSessionDescription(d)).catch(err => {
    LOGGER.error("WebRTC answer error:", err);
  });
});

socket.on("webrtc_ice_candidate", (d) => {
  if (!rtcPC) return;
  rtcPC.addIceCandidate(new RTCIceCandidate(d)).catch(() => {});
});

const LOGGER = { log: console.log.bind(console), error: console.error.bind(console) };

// ===== Cursor =====
function drawCursor() {
  const cx = cursorX * canvas.width, cy = cursorY * canvas.height;
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(88,166,255,0.5)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.7)";
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// ===== Toast =====
let toastTimer = null;
function showToast(text) {
  toast.textContent = text; toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
}

// ===== Zoom =====
function recalcFit() {
  const srcW = useWebRTC ? (screenVideo.videoWidth || canvas.width) : canvas.width;
  const srcH = useWebRTC ? (screenVideo.videoHeight || canvas.height) : canvas.height;
  if (!srcW) return;
  const w = canvasWrap.clientWidth, h = canvasWrap.clientHeight;
  const a = srcW / srcH;
  baseFitW = w; baseFitH = baseFitW / a;
  if (baseFitH > h) { baseFitH = h; baseFitW = baseFitH * a; }
}
function applyZoom() {
  const w = Math.round(baseFitW * zoomLevel), h = Math.round(baseFitH * zoomLevel);
  screenContainer.style.width = w + "px"; screenContainer.style.height = h + "px";
  if (!useWebRTC) { canvas.style.width = w + "px"; canvas.style.height = h + "px"; }
  canvasCenter.style.minWidth = zoomLevel <= 1.01 ? "100%" : w + "px";
  canvasCenter.style.minHeight = zoomLevel <= 1.01 ? "100%" : h + "px";
  $("zoom-label").textContent = zoomLevel === 1 ? "Fit" : Math.round(zoomLevel * 100) + "%";
  if (typeof updatePanButtons === "function") updatePanButtons();
}
function setZoom(z) { zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(z * 4) / 4)); applyZoom(); }
window.addEventListener("resize", () => { recalcFit(); applyZoom(); });
$("btn-zi").onclick = () => setZoom(zoomLevel + ZOOM_STEP);
$("btn-zo").onclick = () => setZoom(zoomLevel - ZOOM_STEP);
$("btn-zf").onclick = () => { setZoom(1); canvasWrap.scrollTo(0, 0); };

// ===== Panel management =====
function openPanel(id) {
  if (activePanel === id) { closePanel(); return; }
  document.querySelectorAll(".panel-page").forEach(p => p.classList.remove("visible"));
  $(id).classList.add("visible");
  document.documentElement.style.setProperty("--panel-h", PANEL_HEIGHT + "px");
  bottomPanel.classList.add("open");
  activePanel = id;
  ["btn-p-kb","btn-p-tp","btn-p-clip","btn-p-files"].forEach(b => $(b).classList.remove("active"));
  const btnMap = {"panel-kb":"btn-p-kb","panel-tp":"btn-p-tp","panel-clip":"btn-p-clip","panel-files":"btn-p-files"};
  if (btnMap[id]) $(btnMap[id]).classList.add("active");
  setTimeout(() => { recalcFit(); applyZoom(); }, 220);
}
function closePanel() {
  bottomPanel.classList.remove("open");
  document.documentElement.style.setProperty("--panel-h", "0px");
  activePanel = null;
  ["btn-p-kb","btn-p-tp","btn-p-clip","btn-p-files"].forEach(b => $(b).classList.remove("active"));
  setTimeout(() => { recalcFit(); applyZoom(); }, 220);
}

$("btn-p-kb").onclick = () => openPanel("panel-kb");
$("btn-p-tp").onclick = () => openPanel("panel-tp");
$("btn-p-clip").onclick = () => { openPanel("panel-clip"); socket.emit("clipboard_get"); };
$("btn-p-files").onclick = () => { openPanel("panel-files"); loadFiles(); };

// ===== Coordinate helpers =====
function canvasCoords(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: Math.max(0, Math.min(1, (cx - r.left) / r.width)), y: Math.max(0, Math.min(1, (cy - r.top) / r.height)) };
}
function throttle(fn, ms) { let l = 0; return (...a) => { const n = Date.now(); if (n - l >= ms) { l = n; fn(...a); } }; }
const emitMove = throttle((c) => socket.emit("move", c), 15);

// ===== Sticky modifiers =====
function getActiveMods() {
  const m = [];
  if (mods.ctrl) m.push("ctrl");
  if (mods.alt) m.push("alt");
  if (mods.cmd) m.push("cmd");
  if (mods.shift) m.push("shift");
  return m;
}
let modsTimer = null;
function releaseMods() {
  mods.ctrl = mods.alt = mods.cmd = mods.shift = false;
  document.querySelectorAll(".vk-key.mod").forEach(b => b.classList.remove("held"));
  clearTimeout(modsTimer);
}
function scheduleModsClear() {
  clearTimeout(modsTimer);
  if (mods.ctrl || mods.alt || mods.cmd || mods.shift) {
    modsTimer = setTimeout(() => { releaseMods(); showToast("Sticky mods auto-cleared"); }, 8000);
  }
}
function sendKeyWithMods(key) {
  if (viewOnly) return;
  const m = getActiveMods();
  if (m.length > 0) {
    socket.emit("hotkey", { modifiers: m, key });
    releaseMods();
  } else {
    socket.emit("keydown", { key, ctrl: false, alt: false, shift: false, meta: false });
  }
}

// Modifier toggle buttons
document.querySelectorAll(".vk-key.mod").forEach(btn => {
  btn.addEventListener("click", (e) => {
    e.preventDefault();
    const mod = btn.dataset.mod;
    mods[mod] = !mods[mod];
    btn.classList.toggle("held", mods[mod]);
    scheduleModsClear();
  });
  btn.addEventListener("touchstart", (e) => e.stopPropagation(), { passive: true });
});

// ===== Virtual Keyboard — key buttons =====
document.querySelectorAll(".vk-key[data-key]").forEach(btn => {
  function fire(e) {
    e.preventDefault(); e.stopPropagation();
    sendKeyWithMods(btn.dataset.key);
  }
  btn.addEventListener("click", fire);
  btn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); fire(e); });
});

// Shortcut buttons
document.querySelectorAll(".vk-key[data-hk]").forEach(btn => {
  function fire(e) {
    e.preventDefault(); e.stopPropagation();
    if (viewOnly) return;
    const parts = btn.dataset.hk.split("+");
    const key = parts.pop();
    socket.emit("hotkey", { modifiers: parts, key });
  }
  btn.addEventListener("click", fire);
  btn.addEventListener("touchend", (e) => { e.preventDefault(); e.stopPropagation(); fire(e); });
});

// Text input send
$("vk-text-send").onclick = () => {
  const t = $("vk-text-input").value;
  if (t) { socket.emit("type_text", { text: t }); $("vk-text-input").value = ""; showToast("Text sent"); }
};
$("vk-text-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); $("vk-text-send").click(); }
  e.stopPropagation();
});

// ===== Virtual Trackpad =====
const tpArea = $("trackpad-area");
let tpLast = null, tpStart = null, tpStartTime = 0;
let tpDragMode = false;
let tpDragging = false;
let tpLastTapTime = 0;
const TAP_TAP_WINDOW = 350;

function tpMoveCursor(t) {
  if (!tpLast) return;
  const r = tpArea.getBoundingClientRect();
  const dx = (t.clientX - tpLast.x) / r.width * cursorSens;
  const dy = (t.clientY - tpLast.y) / r.height * cursorSens;
  cursorX = Math.max(0, Math.min(1, cursorX + dx));
  cursorY = Math.max(0, Math.min(1, cursorY + dy));
}

tpArea.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (viewOnly) return;
  const t = e.touches[0];
  tpLast = { x: t.clientX, y: t.clientY };
  tpStart = { x: t.clientX, y: t.clientY };
  tpStartTime = Date.now();

  if (!tpDragMode && (tpStartTime - tpLastTapTime) < TAP_TAP_WINDOW) {
    tpDragging = true;
    socket.emit("mousedown", { x: cursorX, y: cursorY, btn: "left" });
    tpArea.textContent = "Dragging (tap-hold)...";
  }

  if (tpDragMode && !tpDragging) {
    tpDragging = true;
    socket.emit("mousedown", { x: cursorX, y: cursorY, btn: "left" });
    tpArea.textContent = "Dragging...";
  }
}, { passive: false });

tpArea.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (viewOnly) return;
  const t = e.touches[0];
  tpMoveCursor(t);
  tpLast = { x: t.clientX, y: t.clientY };
  if (tpDragging) {
    socket.emit("drag", { x: cursorX, y: cursorY });
  } else {
    emitMove({ x: cursorX, y: cursorY });
  }
}, { passive: false });

tpArea.addEventListener("touchend", (e) => {
  e.preventDefault();
  if (viewOnly) return;

// ===== Touch on canvas =====
let tStartTime = 0, tStartXY = {x:0,y:0}, tMoved = false, trackpadLP = null;
let pinchActive = false, lastPinchDist = 0, pinchBaseZoom = 1;
let twoFingerMid = null;
let lastCanvasTapTime = 0;
let canvasDragging = false;

function pDist(a,b) { return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function midpoint(a,b) { return { x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 }; }

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (viewOnly) return;
  if (e.touches.length === 2) {
    pinchActive = true;
    lastPinchDist = pDist(e.touches[0], e.touches[1]);
    pinchBaseZoom = zoomLevel;
    twoFingerMid = midpoint(e.touches[0], e.touches[1]);
    return;
  }
  if (e.touches.length !== 1) return;
  const t = e.touches[0], c = canvasCoords(t.clientX, t.clientY);
  tStartTime = Date.now(); tStartXY = {x:t.clientX,y:t.clientY}; tMoved = false;
  if (interactionMode === "direct") {
    cursorX = c.x; cursorY = c.y;
    if (tStartTime - lastCanvasTapTime < 350) {
      canvasDragging = true;
      socket.emit("mousedown", {...c, btn: "left"});
    } else {
      emitMove(c);
    }
  }
  else trackpadLP = {x:t.clientX,y:t.clientY};
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (viewOnly) return;
  if (e.touches.length === 2 && pinchActive) {
    const d = pDist(e.touches[0], e.touches[1]);
    if (lastPinchDist > 0) setZoom(pinchBaseZoom * d / lastPinchDist);

    const mid = midpoint(e.touches[0], e.touches[1]);
    if (twoFingerMid) {
      const dx = mid.x - twoFingerMid.x;
      const dy = mid.y - twoFingerMid.y;
      if (zoomLevel > 1.01) {
        canvasWrap.scrollLeft -= dx;
        canvasWrap.scrollTop -= dy;
      } else {
        if (Math.abs(dy) > 3) {
          socket.emit("scroll", { dy: dy > 0 ? -1 : 1 });
        }
      }
    }
    twoFingerMid = mid;
    return;
  }
  if (e.touches.length !== 1) return;
  tMoved = true;
  const t = e.touches[0];
  if (interactionMode === "direct") {
    const c = canvasCoords(t.clientX, t.clientY); cursorX = c.x; cursorY = c.y;
    if (canvasDragging) socket.emit("drag", c); else emitMove(c);
  }
  else if (trackpadLP) {
    const r = canvas.getBoundingClientRect();
    cursorX = Math.max(0, Math.min(1, cursorX + (t.clientX-trackpadLP.x)/r.width*cursorSens));
    cursorY = Math.max(0, Math.min(1, cursorY + (t.clientY-trackpadLP.y)/r.height*cursorSens));
    emitMove({x:cursorX,y:cursorY});
    trackpadLP = {x:t.clientX,y:t.clientY};
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  if (viewOnly) return;
  if (e.touches.length < 2) { pinchActive = false; lastPinchDist = 0; twoFingerMid = null; }
  if (e.touches.length > 0) return;
  const t = e.changedTouches[0], elapsed = Date.now()-tStartTime;
  const dist = Math.hypot(t.clientX-tStartXY.x, t.clientY-tStartXY.y);
  const c = interactionMode === "direct" ? canvasCoords(t.clientX, t.clientY) : {x:cursorX,y:cursorY};

  if (interactionMode === "direct" && canvasDragging) {
    socket.emit("mouseup", {...c, btn:"left"});
    canvasDragging = false;
    if (elapsed < 250 && dist < 15) socket.emit("dblclick", c);
  } else if (elapsed < 300 && dist < 15) {
    lastCanvasTapTime = Date.now();
    socket.emit("click", {...c, btn:"left"});
  }
  trackpadLP = null;
}, { passive: false });

// ===== Keyboard =====
function buildModList(e) {
  const allMods = [];
  if (e.ctrlKey || mods.ctrl) allMods.push(isMacBrowser ? "ctrl" : "cmd");
  if (e.altKey || mods.alt) allMods.push("alt");
  if (e.metaKey || mods.cmd) { if (!allMods.includes("cmd")) allMods.push("cmd"); }
  if (e.shiftKey || mods.shift) allMods.push("shift");
  return allMods;
}

let _lastKeyTs = 0, _lastKeyVal = "";
function handleKeyDown(e) {
  if (!isConnected || viewOnly) return;
  if ($("settings-overlay").classList.contains("open")) return;
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (["Shift","Control","Alt","Meta","Fn","FnLock"].includes(e.key)) return;
  e.preventDefault();

  // Guard against rapid duplicate key events (OS autorepeat or ghost events)
  const now = Date.now();
  if (e.key === _lastKeyVal && now - _lastKeyTs < 80 && !e.repeat) return;
  _lastKeyTs = now; _lastKeyVal = e.key;

  // When zoomed in + Shift held, arrow keys pan the local view
  if (zoomLevel > 1.05 && e.shiftKey && ["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) {
    const s = 100;
    const map = { ArrowLeft: [-s,0], ArrowRight: [s,0], ArrowUp: [0,-s], ArrowDown: [0,s] };
    const [dx, dy] = map[e.key];
    canvasWrap.scrollBy({ left: dx, top: dy, behavior: "smooth" });
    return;
  }

  // Intercept paste — sync browser clipboard to remote first
  if ((e.key === 'v' || e.key === 'V') && (e.ctrlKey || e.metaKey)) {
    syncClipboardAndPaste();
    const hadSticky = mods.ctrl || mods.alt || mods.cmd || mods.shift;
    if (hadSticky) releaseMods();
    return;
  }

  const allMods = buildModList(e);
  const hadSticky = mods.ctrl || mods.alt || mods.cmd || mods.shift;

  if (allMods.length > 0) {
    socket.emit("hotkey", { modifiers: allMods, key: e.key });
    // Auto-sync clipboard after copy/cut
    if (allMods.includes("cmd") && ['c','C','x','X'].includes(e.key)) {
      setTimeout(() => socket.emit("clipboard_get"), 250);
    }
    if (hadSticky) releaseMods();
  } else {
    socket.emit("keydown", { key: e.key, ctrl: false, shift: false, alt: false, meta: false });
  }
}
canvas.addEventListener("keydown", handleKeyDown);

// Release any physical modifier that might stick on blur/focus change
window.addEventListener("blur", () => { releaseMods(); });
canvas.addEventListener("focus", () => { _lastKeyVal = ""; });

// NKB keydown
$("kb-input").addEventListener("keydown", (e) => {
  if (!isConnected || viewOnly) return;
  e.stopPropagation();
  if (["Shift","Control","Alt","Meta"].includes(e.key)) return;
  if (e.key === "Unidentified" || e.key === "Process") return;

  const hasActionMod = e.ctrlKey || mods.ctrl || e.altKey || mods.alt || e.metaKey || mods.cmd;
  const isSpecialKey = e.key.length > 1;

  if (!hasActionMod && !isSpecialKey) return;

  e.preventDefault();

  const allMods = buildModList(e);
  const hadSticky = mods.ctrl || mods.alt || mods.cmd || mods.shift;

  if (allMods.length > 0) {
    socket.emit("hotkey", { modifiers: allMods, key: e.key });
  } else {
    socket.emit("keydown", { key: e.key, ctrl: false, shift: false, alt: false, meta: false });
  }
  if (hadSticky) releaseMods();
});

// ===== Audio =====
let audioBuffer = new Float32Array(0);

function initAudioPlayback() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
  const BUFSIZE = 4096;
  audioProcessor = audioCtx.createScriptProcessor(BUFSIZE, 1, 1);
  audioProcessor.onaudioprocess = (ev) => {
    const output = ev.outputBuffer.getChannelData(0);
    if (audioBuffer.length >= output.length) {
      output.set(audioBuffer.subarray(0, output.length));
      audioBuffer = audioBuffer.slice(output.length);
    } else {
      if (audioBuffer.length > 0) {
        output.set(audioBuffer);
        output.fill(0, audioBuffer.length);
        audioBuffer = new Float32Array(0);
      } else {
        output.fill(0);
      }
    }
  };
  audioProcessor.connect(audioCtx.destination);
}

socket.on("audio_data", (d) => {
  if (!audioActive) return;
  try {
    const raw = atob(d.pcm);
    const int16 = new Int16Array(raw.length / 2);
    for (let i = 0; i < int16.length; i++) {
      int16[i] = raw.charCodeAt(i * 2) | (raw.charCodeAt(i * 2 + 1) << 8);
    }
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
    
    const newBuffer = new Float32Array(audioBuffer.length + float32.length);
    newBuffer.set(audioBuffer, 0);
    newBuffer.set(float32, audioBuffer.length);
    audioBuffer = newBuffer;

    // Prevent buffer bloat
    if (audioBuffer.length > 88200) {
      audioBuffer = audioBuffer.slice(audioBuffer.length - 88200);
    }
  } catch {}
});

socket.on("audio_status", (d) => {
  audioActive = d.active;
  $("btn-audio").classList.toggle("audio-active", d.active);
  if (d.error) showToast("Audio: " + d.error);
  else showToast(d.active ? "Audio streaming ON" : "Audio streaming OFF");
});

$("btn-audio").onclick = () => {
  if (audioActive) {
    socket.emit("audio_stop");
    if (audioCtx) { audioProcessor.disconnect(); audioCtx.close(); audioCtx = null; audioProcessor = null; }
    audioBuffer = new Float32Array(0);
  } else {
    initAudioPlayback();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const deviceSel = $("sel-audio-device");
    const deviceIdx = deviceSel.value ? parseInt(deviceSel.value) : null;
    socket.emit("audio_start", deviceIdx !== null ? { device: deviceIdx } : {});
  }
};

// Load audio devices when settings open
function loadAudioDevices() {
  fetch(BASE + "/api/audio_devices").then(r => r.json()).then(data => {
    const sel = $("sel-audio-device");
    sel.innerHTML = "";
    if (!data.available) {
      sel.innerHTML = '<option value="">Not available (install sounddevice)</option>';
      return;
    }
    $("audio-device-row").style.display = "block";
    sel.innerHTML = '<option value="">Default</option>';
    data.devices.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.index;
      opt.textContent = d.name + " (" + d.channels + "ch, " + d.sample_rate + "Hz)";
      sel.appendChild(opt);
    });
  }).catch(() => {});
}

// ===== Latency =====
setInterval(() => {
  if (!isConnected) return;
  socket.emit("ping_check", { t: Date.now() });
}, 3000);
socket.on("pong_check", (d) => {
  latencyMs = Date.now() - d.t;
  $("latency-display").textContent = latencyMs + "ms";
  $("latency-display").style.color = latencyMs < 50 ? "var(--green)" : latencyMs < 150 ? "var(--orange)" : "var(--red)";
});

// ===== Screenshot =====
$("btn-screenshot").onclick = () => {
  showToast("Capturing HD screenshot…");
  const url = BASE + "/api/screenshot";
  fetch(url).then(r => {
    if (!r.ok) throw new Error("Server error");
    return r.blob();
  }).then(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "screenshot_" + new Date().toISOString().replace(/[:.]/g, "-") + ".png";
    a.click();
    URL.revokeObjectURL(a.href);
    showToast("HD screenshot saved");
  }).catch(() => {
    // Fallback to client-side capture
    const link = document.createElement("a");
    link.download = "screenshot_" + new Date().toISOString().replace(/[:.]/g, "-") + ".png";
    if (useWebRTC && screenVideo.videoWidth) {
      const sc = document.createElement("canvas");
      sc.width = screenVideo.videoWidth; sc.height = screenVideo.videoHeight;
      sc.getContext("2d").drawImage(screenVideo, 0, 0);
      link.href = sc.toDataURL("image/png");
    } else {
      link.href = canvas.toDataURL("image/png");
    }
    link.click();
    showToast("Screenshot saved (fallback)");
  });
};

// ===== View-Only Mode =====
$("btn-viewonly").onclick = () => {
  viewOnly = !viewOnly;
  $("btn-viewonly").classList.toggle("active", viewOnly);
  document.body.classList.toggle("view-only", viewOnly);
  if (viewOnly) {
    canvas.style.cursor = "default";
    isDragging = false;
  } else {
    canvas.style.cursor = "none";
  }
  showToast(viewOnly ? "View-only mode — input disabled" : "Interactive mode");
};

// ===== Fullscreen =====
$("btn-fullscreen").onclick = () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen().catch(() => showToast("Fullscreen not supported"));
  }
};
document.addEventListener("fullscreenchange", () => {
  $("btn-fullscreen").classList.toggle("active", !!document.fullscreenElement);
  setTimeout(() => { recalcFit(); applyZoom(); }, 100);
});

// ===== Settings =====
$("sl-fps").oninput = () => $("val-fps").textContent = $("sl-fps").value;
$("sl-q").oninput = () => $("val-q").textContent = $("sl-q").value;
$("sl-s").oninput = () => $("val-s").textContent = ($("sl-s").value/100).toFixed(2);
$("sl-sens").oninput = () => $("val-sens").textContent = ($("sl-sens").value / 10).toFixed(1);
$("btn-settings").onclick = () => { $("settings-overlay").classList.add("open"); loadAudioDevices(); };
$("s-cancel").onclick = () => $("settings-overlay").classList.remove("open");
$("settings-overlay").onclick = (e) => { if (e.target === $("settings-overlay")) $("settings-overlay").classList.remove("open"); };
$("s-apply").onclick = () => {
  const cfg = {
    fps: +$("sl-fps").value,
    quality: +$("sl-q").value,
    scale: +$("sl-s").value / 100,
    format: $("sel-fmt").value,
  };
  socket.emit("update_settings", cfg);
  cursorSens = +$("sl-sens").value / 10;
  // Save to localStorage
  saveSettings({ fps: cfg.fps, quality: cfg.quality, scale: +$("sl-s").value, format: cfg.format, sens: cursorSens });
  $("settings-overlay").classList.remove("open");
  showToast("Settings applied & saved");
};

canvas.focus();
})();
</script>
</body>
</html>
