<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>PC Remote</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2129;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --radius: 8px;
  --toolbar-h: 44px;
  --bottombar-h: 48px;
  --panel-h: 0px;
}
body.bb-hidden {
  --bottombar-h: 0px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; overflow:hidden; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

/* ---- Toolbar ---- */
#toolbar {
  position:fixed; top:0; left:0; right:0; height:var(--toolbar-h);
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 8px; gap:6px; z-index:100;
  user-select:none; overflow-x:auto; overflow-y:hidden;
}
.status-dot { width:9px; height:9px; border-radius:50%; background:var(--red); flex-shrink:0; transition:background .3s; }
.status-dot.connected { background:var(--green); }
.tl { font-size:12px; color:var(--text-dim); white-space:nowrap; }
.spacer { flex:1; min-width:4px; }
.tb {
  background:transparent; border:1px solid var(--border); color:var(--text-dim);
  padding:4px 8px; border-radius:6px; font-size:12px; cursor:pointer;
  transition:all .12s; white-space:nowrap; flex-shrink:0;
}
.tb:hover { background:var(--border); color:var(--text); }
.tb.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tb.audio-active { background:var(--green); color:#000; border-color:var(--green); }
.zoom-g { display:flex; align-items:center; gap:3px; flex-shrink:0; }
.zoom-g .tb { padding:4px 6px; font-weight:700; }
#zoom-label { font-size:11px; color:var(--text); min-width:32px; text-align:center; }
#latency-display { font-size:10px; color:var(--green); white-space:nowrap; flex-shrink:0; font-variant-numeric:tabular-nums; }
#frame-info { font-size:10px; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }

/* ---- Canvas ---- */
#canvas-wrap {
  position:fixed; top:var(--toolbar-h); left:0; right:0;
  bottom:calc(var(--panel-h) + var(--bottombar-h)); background:#000; overflow:auto; touch-action:none;
  transition:bottom .2s;
}
#canvas-center {
  display:flex; align-items:flex-start; justify-content:center;
  min-width:100%; min-height:100%;
  padding-top:12px; padding-bottom:60vh;
}
#screen-container { position:relative; display:inline-block; flex-shrink:0; }
#screen-video {
  display:block; background:#000;
  width:100%; height:100%;
}
#screen-video.hidden { display:none; }
#screen {
  display:block; cursor:none; flex-shrink:0;
}
#screen.overlay {
  position:absolute; top:0; left:0;
  width:100% !important; height:100% !important;
  background:transparent;
}
.view-only #screen, .view-only #trackpad-area { pointer-events:none; cursor:default; }
.view-only #screen.overlay { pointer-events:none; cursor:default; }
#viewonly-badge {
  display:none; position:fixed; bottom:calc(var(--panel-h) + var(--bottombar-h) + 8px); right:8px;
  background:var(--orange); color:#000; padding:4px 12px; border-radius:12px;
  font-size:11px; font-weight:700; z-index:95; pointer-events:none;
}
.view-only #viewonly-badge { display:block; }

/* ---- Pan Overlay (zoomed-in navigation) ---- */
#pan-overlay {
  position:fixed; z-index:92; pointer-events:none;
  right:16px; bottom:calc(var(--panel-h) + var(--bottombar-h) + 16px);
  width:110px; height:110px;
}
.pan-btn {
  position:absolute; pointer-events:auto;
  width:36px; height:36px; border-radius:50%;
  background:rgba(22,27,34,0.85); border:1px solid var(--border);
  color:var(--text); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .1s; user-select:none; -webkit-user-select:none;
  box-shadow:0 2px 6px rgba(0,0,0,.4); backdrop-filter:blur(4px);
}
.pan-btn:hover { background:rgba(88,166,255,0.25); }
.pan-btn:active { background:var(--accent); color:#fff; }
#pan-up    { top:0;  left:50%; transform:translateX(-50%); }
#pan-down  { bottom:0; left:50%; transform:translateX(-50%); }
#pan-left  { left:0; top:50%; transform:translateY(-50%); }
#pan-right { right:0; top:50%; transform:translateY(-50%); }

/* ---- Bottom Action Bar ---- */
#bottombar {
  position:fixed; left:6px; right:6px; bottom:6px; min-height:calc(var(--bottombar-h) - 12px);
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  display:flex; flex-wrap:nowrap; align-items:center; padding:4px 8px; gap:3px; z-index:100;
  user-select:none; overflow-x:auto; overflow-y:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
#bottombar::-webkit-scrollbar { height:4px; }
#bottombar::-webkit-scrollbar-track { background:transparent; }
#bottombar::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.bb { 
  background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
  padding:5px 0; border-radius:6px; font-size:12px; cursor:pointer;
  text-align:center; min-width:34px; flex-shrink:0;
  transition:all .1s; user-select:none; -webkit-user-select:none; line-height:1;
}
.bb:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.bb.sep { background:transparent; border:none; color:var(--border); cursor:default; padding:0 1px; min-width:auto; font-size:14px; }
.bb.wide { min-width:44px; padding:5px 6px; }
.bb.arrow { font-size:16px; min-width:32px; }
#bb-text-input {
  width:140px; min-width:100px; flex-shrink:0; height:26px;
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); font-size:12px; padding:0 6px; outline:none;
}
#bb-text-input:focus { border-color:var(--accent); }
#bb-text-input::placeholder { color:var(--text-dim); font-size:11px; }

/* ---- Bottom bar collapse ---- */
#bottombar { transition: transform .2s, opacity .2s; }
body.bb-hidden #bottombar { transform: translateY(calc(100% + 12px)); opacity:0; pointer-events:none; }
#bb-show-tab {
  display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border); border-bottom:none;
  border-radius:8px 8px 0 0; color:var(--text-dim); font-size:16px;
  padding:2px 14px 0; cursor:pointer; z-index:101; line-height:1.6;
  transition: color .15s;
}
#bb-show-tab:hover { color:var(--text); }
body.bb-hidden #bb-show-tab { display:block; }

/* ---- Bottom Panel Container ---- */
#bottom-panel {
  position:fixed; left:0; right:0; bottom:var(--bottombar-h); height:0;
  background:var(--surface); border-top:1px solid var(--border);
  z-index:90; overflow:hidden; transition:height .2s;
}
#bottom-panel.open { height:var(--panel-h); }
.panel-page { display:none; height:100%; overflow-y:auto; }
.panel-page.visible { display:block; }

/* ---- Virtual Keyboard Panel ---- */
.vk-section { padding:6px 8px; border-bottom:1px solid var(--border); }
.vk-section:last-child { border-bottom:none; }
.vk-row { display:flex; gap:4px; flex-wrap:wrap; }
.vk-label { font-size:10px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.vk-key {
  background:var(--surface2); border:1px solid var(--border); color:var(--text-dim);
  padding:6px 0; border-radius:6px; font-size:12px; cursor:pointer;
  text-align:center; min-width:36px; flex:1; max-width:60px;
  transition:all .1s; user-select:none; -webkit-user-select:none;
}
.vk-key:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.vk-key.wide { max-width:80px; }
.vk-key.wider { max-width:120px; flex:2; }
.vk-key.mod { border-color:var(--orange); color:var(--orange); }
.vk-key.mod.held { background:var(--orange); color:#000; border-color:var(--orange); }
.vk-key.shortcut { font-size:10px; border-color:var(--accent); color:var(--accent); max-width:72px; }
.vk-key.shortcut:active { background:var(--accent); color:#fff; }
.vk-text-row { display:flex; gap:4px; }
#vk-text-input {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:6px 10px; font-size:14px; outline:none;
}
#vk-text-input:focus { border-color:var(--accent); }
#vk-text-send {
  background:var(--accent); color:#fff; border:none; border-radius:6px;
  padding:6px 14px; font-size:12px; cursor:pointer;
}

/* ---- Virtual Trackpad Panel ---- */
#trackpad-area {
  background:var(--bg); margin:8px; border-radius:10px; border:1px solid var(--border);
  height:calc(100% - 60px); min-height:100px; touch-action:none; cursor:crosshair;
  display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:13px;
  user-select:none; -webkit-user-select:none;
}
.tp-buttons { display:flex; gap:4px; padding:4px 8px; }
.tp-btn {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  color:var(--text-dim); padding:8px; border-radius:6px; text-align:center;
  font-size:12px; cursor:pointer; user-select:none; -webkit-user-select:none;
}
.tp-btn:active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tp-btn.active { background:var(--orange); color:#000; border-color:var(--orange); }

/* ---- File Panel ---- */
.file-section { padding:8px; }
.file-upload-row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
.file-upload-row input[type=file] { flex:1; font-size:12px; color:var(--text-dim); }
.file-upload-btn {
  background:var(--accent); color:#fff; border:none; border-radius:6px;
  padding:6px 14px; font-size:12px; cursor:pointer; white-space:nowrap;
}
.file-path-bar {
  display:flex; align-items:center; gap:4px; margin-bottom:6px;
  font-size:12px; color:var(--text-dim); overflow-x:auto; white-space:nowrap;
}
.file-path-bar button {
  background:var(--surface2); border:1px solid var(--border); color:var(--accent);
  padding:3px 8px; border-radius:4px; font-size:11px; cursor:pointer;
}
.file-list { max-height:calc(100% - 80px); overflow-y:auto; }
.file-item {
  display:flex; align-items:center; gap:8px; padding:6px 8px;
  border-bottom:1px solid var(--border); font-size:12px; cursor:pointer;
}
.file-item:hover { background:var(--surface2); }
.file-icon { font-size:16px; flex-shrink:0; }
.file-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-size { color:var(--text-dim); font-size:11px; flex-shrink:0; }
.file-dl {
  background:var(--surface2); border:1px solid var(--border); color:var(--accent);
  padding:2px 8px; border-radius:4px; font-size:11px; cursor:pointer; text-decoration:none; flex-shrink:0;
}

/* ---- Clipboard Panel ---- */
.clip-section { padding:8px; height:100%; display:flex; flex-direction:column; }
.clip-section textarea {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:6px;
  color:var(--text); padding:8px; font-size:13px; resize:none; outline:none; font-family:monospace;
}
.clip-section textarea:focus { border-color:var(--accent); }
.clip-actions { display:flex; gap:6px; margin-top:6px; }
.clip-actions button {
  flex:1; padding:8px; border-radius:6px; border:1px solid var(--border);
  font-size:12px; cursor:pointer; background:var(--surface2); color:var(--text-dim);
}
.clip-actions .primary { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ---- Settings ---- */
#settings-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:200; align-items:center; justify-content:center;
}
#settings-overlay.open { display:flex; }
#settings-panel {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:20px; width:340px; max-width:90vw; max-height:90vh; overflow-y:auto;
}
#settings-panel h2 { font-size:15px; margin-bottom:16px; }
.sr { margin-bottom:12px; }
.sr label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
.sr label span { color:var(--text); font-weight:600; }
.sr input[type=range] { width:100%; accent-color:var(--accent); }
.sr select {
  width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
  border-radius:6px; padding:5px 8px; font-size:12px; outline:none;
}
.sa { display:flex; gap:6px; margin-top:16px; }
.sa button { flex:1; padding:7px; border-radius:6px; border:1px solid var(--border); font-size:12px; cursor:pointer; }
.sa .apply { background:var(--accent); color:#fff; border-color:var(--accent); }
.sa .cancel { background:transparent; color:var(--text-dim); }

/* ---- Connection banner ---- */
#connect-banner {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:var(--bg);
  z-index:300; gap:16px; transition:opacity .3s;
}
#connect-banner.hidden { opacity:0; pointer-events:none; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#connect-banner p { font-size:14px; color:var(--text-dim); }

/* ---- Toast ---- */
#toast {
  position:fixed; top:calc(var(--toolbar-h)+8px); left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); color:var(--text); padding:6px 16px;
  border-radius:20px; font-size:12px; z-index:150; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
#toast.show { opacity:1; }

/* ---- Utility ---- */
#kb-input { position:fixed; top:-100px; left:-100px; width:1px; height:1px; opacity:0; }
</style>
</head>
<body>

<div id="connect-banner"><div class="spinner"></div><p>Connecting to PC...</p></div>
<div id="toast"></div>

<!-- ===== Toolbar ===== -->
<div id="toolbar">
  <div class="status-dot" id="status-dot"></div>
  <span class="tl" id="status-text">Disconnected</span>
  <span id="latency-display"></span>
  <span class="tl" id="fps-display"></span>
  <span id="frame-info"></span>
  <span class="spacer"></span>
  <div class="zoom-g">
    <button class="tb" id="btn-zo" title="Zoom out">&minus;</button>
    <span id="zoom-label">Fit</span>
    <button class="tb" id="btn-zi" title="Zoom in">+</button>
    <button class="tb" id="btn-zf" title="Fit">Fit</button>
  </div>
  <select class="tb" id="monitor-sel" title="Select monitor" style="padding:3px 4px;font-size:11px;background:var(--surface);color:var(--text-dim);max-width:120px;"></select>
  <button class="tb" id="btn-mode" title="Direct / Trackpad">Direct</button>
  <button class="tb" id="btn-p-tp" title="Trackpad panel">Pad</button>
  <button class="tb" id="btn-p-kb" title="Virtual keyboard">Keys</button>
  <button class="tb" id="btn-p-clip" title="Clipboard">Clip</button>
  <button class="tb" id="btn-p-files" title="File transfer">Files</button>
  <button class="tb" id="btn-nkb" title="Native keyboard">NKB</button>
  <button class="tb" id="btn-audio" title="Audio">&#128266;</button>
  <button class="tb" id="btn-screenshot" title="Screenshot">&#128247;</button>
  <button class="tb" id="btn-viewonly" title="View-only mode">&#128065;</button>
  <button class="tb" id="btn-fullscreen" title="Fullscreen">&#9974;</button>
  <button class="tb" id="btn-settings" title="Settings">&#9881;</button>
</div>

<!-- ===== Canvas ===== -->
<div id="canvas-wrap">
  <div id="canvas-center">
    <div id="screen-container">
      <video id="screen-video" autoplay playsinline muted class="hidden"></video>
      <canvas id="screen" tabindex="0"></canvas>
    </div>
  </div>
</div>
<div id="viewonly-badge">VIEW ONLY</div>

<!-- ===== Pan Overlay (visible when zoomed) ===== -->
<div id="pan-overlay" style="display:none">
  <button class="pan-btn" id="pan-up" title="Pan up">&#9650;</button>
  <button class="pan-btn" id="pan-left" title="Pan left">&#9664;</button>
  <button class="pan-btn" id="pan-right" title="Pan right">&#9654;</button>
  <button class="pan-btn" id="pan-down" title="Pan down">&#9660;</button>
</div>

<!-- ===== Bottom Bar Toggle (shown when bar is hidden) ===== -->
<button id="bb-show-tab" title="Show action bar">⌨︎</button>

<!-- ===== Bottom Action Bar ===== -->
<div id="bottombar">
  <button class="bb" id="bb-hide" title="Hide action bar" style="padding:5px 4px;min-width:22px;color:var(--text-dim);font-size:14px;">✕</button>
  <span class="bb sep">|</span>
  <button class="bb wide" id="bb-lclick" title="Left Click">L Click</button>
  <button class="bb wide" id="bb-rclick" title="Right Click">R Click</button>
  <button class="bb wide" id="bb-dblclick" title="Double Click">Dbl</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-sup" title="Scroll Up">&#8593;Scr</button>
  <button class="bb" id="bb-sdn" title="Scroll Down">&#8595;Scr</button>
  <span class="bb sep">|</span>
  <button class="bb arrow" id="bb-left" title="Arrow Left">&larr;</button>
  <button class="bb arrow" id="bb-down" title="Arrow Down">&darr;</button>
  <button class="bb arrow" id="bb-up" title="Arrow Up">&uarr;</button>
  <button class="bb arrow" id="bb-right" title="Arrow Right">&rarr;</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-esc" title="Escape">Esc</button>
  <button class="bb" id="bb-tab" title="Tab">Tab</button>
  <button class="bb" id="bb-enter" title="Enter">&#9166;</button>
  <button class="bb" id="bb-bksp" title="Backspace">&#9003;</button>
  <button class="bb" id="bb-space" title="Space">Space</button>
  <button class="bb" id="bb-del" title="Delete">Del</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-home" title="Home">Home</button>
  <button class="bb" id="bb-end" title="End">End</button>
  <button class="bb" id="bb-pgup" title="Page Up">PgUp</button>
  <button class="bb" id="bb-pgdn" title="Page Down">PgDn</button>
  <span class="bb sep">|</span>
  <button class="bb" id="bb-mclick" title="Middle Click">Mid</button>
  <span class="bb sep">|</span>
  <input type="text" id="bb-text-input" placeholder="Type text & push…" autocomplete="off" spellcheck="false">
  <button class="bb wide" id="bb-text-push" title="Push text to remote cursor">Push</button>

</div>

<!-- ===== Bottom Panel ===== -->
<div id="bottom-panel">

  <!-- Virtual Keyboard -->
  <div id="panel-kb" class="panel-page">
    <div class="vk-section">
      <div class="vk-label">Modifiers (sticky — tap to hold, tap again to release)</div>
      <div class="vk-row" id="mod-row">
        <button class="vk-key mod" data-mod="ctrl">Ctrl</button>
        <button class="vk-key mod" data-mod="alt">Alt/&#8997;</button>
        <button class="vk-key mod" data-mod="cmd">Cmd/&#8984;</button>
        <button class="vk-key mod" data-mod="shift">Shift/&#8679;</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Developer Shortcuts</div>
      <div class="vk-row">
        <button class="vk-key shortcut" data-hk="cmd+s">&#8984;S</button>
        <button class="vk-key shortcut" data-hk="cmd+c">&#8984;C</button>
        <button class="vk-key shortcut" data-hk="cmd+v">&#8984;V</button>
        <button class="vk-key shortcut" data-hk="cmd+x">&#8984;X</button>
        <button class="vk-key shortcut" data-hk="cmd+z">&#8984;Z</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+z">&#8984;&#8679;Z</button>
        <button class="vk-key shortcut" data-hk="cmd+a">&#8984;A</button>
        <button class="vk-key shortcut" data-hk="cmd+f">&#8984;F</button>
      </div>
      <div class="vk-row" style="margin-top:4px">
        <button class="vk-key shortcut" data-hk="cmd+shift+p">&#8984;&#8679;P</button>
        <button class="vk-key shortcut" data-hk="cmd+p">&#8984;P</button>
        <button class="vk-key shortcut" data-hk="cmd+w">&#8984;W</button>
        <button class="vk-key shortcut" data-hk="cmd+t">&#8984;T</button>
        <button class="vk-key shortcut" data-hk="cmd+n">&#8984;N</button>
        <button class="vk-key shortcut" data-hk="cmd+`">&#8984;`</button>
        <button class="vk-key shortcut" data-hk="cmd+Tab">&#8984;Tab</button>
        <button class="vk-key shortcut" data-hk="ctrl+`">&#8963;`</button>
      </div>
      <div class="vk-row" style="margin-top:4px">
        <button class="vk-key shortcut" data-hk="cmd+shift+f">&#8984;&#8679;F</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+e">&#8984;&#8679;E</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+k">&#8984;&#8679;K</button>
        <button class="vk-key shortcut" data-hk="alt+Enter">&#8997;&#9166;</button>
        <button class="vk-key shortcut" data-hk="cmd+d">&#8984;D</button>
        <button class="vk-key shortcut" data-hk="cmd+/">&#8984;/</button>
        <button class="vk-key shortcut" data-hk="alt+shift+f">&#8997;&#8679;F</button>
        <button class="vk-key shortcut" data-hk="cmd+shift+l">&#8984;&#8679;L</button>
        <button class="vk-key shortcut" data-hk="ctrl+c">&#8963;C</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label sc-label">Screenshot &amp; System</div>
      <div class="vk-row">
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+3">&#8984;&#8679;3</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+4">&#8984;&#8679;4</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+5">&#8984;&#8679;5</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+shift+6">&#8984;&#8679;6</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+ctrl+q">&#8984;&#8963;Q</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+space">&#8984;Space</button>
        <button class="vk-key shortcut sc-key" data-hk="cmd+alt+Escape">&#8984;&#8997;Esc</button>
        <button class="vk-key shortcut sc-key" data-hk="ctrl+alt+Delete">&#8963;&#8997;Del</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Navigation &amp; Special</div>
      <div class="vk-row">
        <button class="vk-key" data-key="Escape">Esc</button>
        <button class="vk-key" data-key="Tab">Tab</button>
        <button class="vk-key" data-key="Backspace">&#9003;</button>
        <button class="vk-key" data-key="Delete">Del</button>
        <button class="vk-key" data-key="Enter">&#9166;</button>
        <button class="vk-key" data-key=" ">Space</button>
        <button class="vk-key" data-key="Home">Home</button>
        <button class="vk-key" data-key="End">End</button>
        <button class="vk-key" data-key="PageUp">PgUp</button>
        <button class="vk-key" data-key="PageDown">PgDn</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Arrows</div>
      <div class="vk-row" style="justify-content:center; gap:6px;">
        <button class="vk-key" data-key="ArrowLeft" style="font-size:16px">&larr;</button>
        <button class="vk-key" data-key="ArrowDown" style="font-size:16px">&darr;</button>
        <button class="vk-key" data-key="ArrowUp" style="font-size:16px">&uarr;</button>
        <button class="vk-key" data-key="ArrowRight" style="font-size:16px">&rarr;</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Function Keys</div>
      <div class="vk-row">
        <button class="vk-key" data-key="F1">F1</button>
        <button class="vk-key" data-key="F2">F2</button>
        <button class="vk-key" data-key="F3">F3</button>
        <button class="vk-key" data-key="F4">F4</button>
        <button class="vk-key" data-key="F5">F5</button>
        <button class="vk-key" data-key="F6">F6</button>
        <button class="vk-key" data-key="F7">F7</button>
        <button class="vk-key" data-key="F8">F8</button>
        <button class="vk-key" data-key="F9">F9</button>
        <button class="vk-key" data-key="F10">F10</button>
        <button class="vk-key" data-key="F11">F11</button>
        <button class="vk-key" data-key="F12">F12</button>
      </div>
    </div>
    <div class="vk-section">
      <div class="vk-label">Type Text</div>
      <div class="vk-text-row">
        <input type="text" id="vk-text-input" placeholder="Type here, then send..." autocomplete="off" autocorrect="off">
        <button id="vk-text-send">Send</button>
      </div>
    </div>
  </div>

  <!-- Virtual Trackpad -->
  <div id="panel-tp" class="panel-page">
    <div id="trackpad-area">Drag to move cursor &middot; Tap to click</div>
    <div class="tp-buttons">
      <button class="tp-btn" id="tp-left">Left Click</button>
      <button class="tp-btn" id="tp-right">Right Click</button>
      <button class="tp-btn" id="tp-dbl">Double Click</button>
      <button class="tp-btn" id="tp-drag">Drag</button>
      <button class="tp-btn" id="tp-sup">Scroll &#8593;</button>
      <button class="tp-btn" id="tp-sdn">Scroll &#8595;</button>
    </div>
  </div>

  <!-- Clipboard -->
  <div id="panel-clip" class="panel-page">
    <div class="clip-section">
      <textarea id="clip-text" placeholder="Paste text here from your phone (long-press → Paste), then tap 'Send to PC &amp; Paste'"></textarea>
      <div class="clip-actions">
        <button id="clip-read-phone">Read Phone Clipboard</button>
        <button id="clip-get">Get PC Clipboard</button>
      </div>
      <div class="clip-actions" style="margin-top:4px">
        <button id="clip-set">Set PC Clipboard</button>
        <button id="clip-paste" class="primary">Send to PC &amp; Paste</button>
      </div>
    </div>
  </div>

  <!-- File Transfer -->
  <div id="panel-files" class="panel-page">
    <div class="file-section">
      <div class="file-upload-row">
        <input type="file" id="file-input" multiple>
        <button class="file-upload-btn" id="file-upload-btn">Upload to PC</button>
      </div>
      <div class="file-path-bar">
        <button id="file-up">&uarr; Up</button>
        <span id="file-path">~</span>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>
  </div>

</div>

<!-- Settings -->
<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Stream Settings</h2>
    <div class="sr"><label>FPS <span id="val-fps">15</span></label><input type="range" id="sl-fps" min="1" max="60" value="15"></div>
    <div class="sr"><label>Quality <span id="val-q">70</span></label><input type="range" id="sl-q" min="10" max="100" value="70"></div>
    <div class="sr"><label>Scale <span id="val-s">0.75</span></label><input type="range" id="sl-s" min="10" max="200" value="75" step="5"></div>
    <div class="sr"><label>Format</label>
      <select id="sel-fmt">
        <option value="webp" selected>WebP (best balance)</option>
        <option value="jpeg">JPEG (fastest)</option>
        <option value="png">PNG (lossless, slowest)</option>
      </select>
    </div>
    <div class="sr"><label>Cursor Sens <span id="val-sens">2.0</span></label><input type="range" id="sl-sens" min="1" max="50" value="20"></div>
    <div class="sr" id="audio-device-row" style="display:none">
      <label>Audio Device</label>
      <select id="sel-audio-device"><option value="">Loading...</option></select>
    </div>
    <div class="sa">
      <button class="cancel" id="s-cancel">Cancel</button>
      <button class="apply" id="s-apply">Apply</button>
    </div>
  </div>
</div>

<textarea id="kb-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" rows="1"></textarea>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="static/app.js"></script>
</body>
</html>
